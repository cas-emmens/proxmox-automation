---
- name: Update and upgrade packages
  apt:
    update_cache: yes
    upgrade: dist

- name: Install LAMP stack and PHP extensions
  apt:
    name:
      - apache2
      - mariadb-server
      - php
      - php-mysql
      - php-curl
      - php-gd
      - php-mbstring
      - php-xml
      - php-xmlrpc
      - php-soap
      - php-intl
      - php-zip
      - wget
      - openssh-server
      - python3-pymysql
    state: present

- name: Start and enable MariaDB
  systemd:
    name: mariadb
    state: started
    enabled: yes

- name: Create WordPress database
  community.mysql.mysql_db:
    name: wordpress
    state: present
    login_unix_socket: /run/mysqld/mysqld.sock

- name: Create WordPress database user
  community.mysql.mysql_user:
    name: wpuser
    password: wppassword
    priv: "wordpress.*:ALL"
    state: present
    login_unix_socket: /run/mysqld/mysqld.sock

- name: Download WordPress
  get_url:
    url: https://wordpress.org/latest.tar.gz
    dest: /tmp/latest.tar.gz

- name: Extract WordPress
  unarchive:
    src: /tmp/latest.tar.gz
    dest: /tmp/
    remote_src: yes

- name: Copy WordPress to web root
  shell: cp -r /tmp/wordpress/* /var/www/html/
  args:
    creates: /var/www/html/wp-config-sample.php

- name: Remove default index.html
  file:
    path: /var/www/html/index.html
    state: absent

- name: Configure WordPress
  template:
    src: wp-config.php.j2
    dest: /var/www/html/wp-config.php
    owner: www-data
    group: www-data

- name: Set ownership of web root
  file:
    path: /var/www/html
    owner: www-data
    group: www-data
    recurse: yes

- name: Start and enable Apache
  systemd:
    name: apache2
    state: started
    enabled: yes

- name: Create SSH user
  user:
    name: "{{ ssh_user }}"
    shell: /bin/bash
    create_home: yes

- name: Create .ssh directory
  file:
    path: "/home/{{ ssh_user }}/.ssh"
    state: directory
    owner: "{{ ssh_user }}"
    group: "{{ ssh_user }}"
    mode: '0700'

- name: Generate SSH key pair
  openssh_keypair:
    path: "/home/{{ ssh_user }}/.ssh/id_ed25519"
    type: ed25519
    owner: "{{ ssh_user }}"
    group: "{{ ssh_user }}"

- name: Copy public key to authorized_keys
  copy:
    src: "/home/{{ ssh_user }}/.ssh/id_ed25519.pub"
    dest: "/home/{{ ssh_user }}/.ssh/authorized_keys"
    remote_src: yes
    owner: "{{ ssh_user }}"
    group: "{{ ssh_user }}"
    mode: '0600'

- name: Install node_exporter
  block:
    - name: Download node_exporter
      get_url:
        url: https://github.com/prometheus/node_exporter/releases/download/v1.8.1/node_exporter-1.8.1.linux-amd64.tar.gz
        dest: /tmp/node_exporter.tar.gz

    - name: Extract node_exporter
      unarchive:
        src: /tmp/node_exporter.tar.gz
        dest: /tmp/
        remote_src: yes

    - name: Copy node_exporter binary
      copy:
        src: /tmp/node_exporter-1.8.1.linux-amd64/node_exporter
        dest: /usr/local/bin/node_exporter
        mode: '0755'
        remote_src: yes

    - name: Create node_exporter user
      user:
        name: node_exporter
        shell: /bin/false
        create_home: no
        system: yes

    - name: Create node_exporter service
      copy:
        dest: /etc/systemd/system/node_exporter.service
        content: |
          [Unit]
          Description=Node Exporter
          Wants=network-online.target
          After=network-online.target

          [Service]
          User=node_exporter
          Group=node_exporter
          Type=simple
          ExecStart=/usr/local/bin/node_exporter

          [Install]
          WantedBy=multi-user.target

    - name: Start and enable node_exporter
      systemd:
        name: node_exporter
        daemon_reload: yes
        state: started
        enabled: yes
