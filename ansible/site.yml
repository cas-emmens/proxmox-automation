---
# Step 1: Create containers from Proxmox host
- name: Create WordPress LXC containers
  hosts: localhost
  connection: local
  tasks:
    - name: Create LXC containers
      command: >
        pct create {{ hostvars[item].ct_id }}
        local:vztmpl/debian-12-standard_12.12-1_amd64.tar.zst
        --hostname {{ item }}
        --storage ceph-pool
        --rootfs ceph-pool:30
        --cores 1
        --memory 1024
        --net0 name=eth0,bridge=vmbr0,ip={{ hostvars[item].ansible_host }}/24,gw=10.24.36.1,rate=50
        --password changeme123
        --unprivileged 1
        --start 1
      loop: "{{ groups['wordpress'] }}"
      ignore_errors: yes

    - name: Wait for containers to boot
      pause:
        seconds: 15

    - name: Configure firewall for each container
      shell: |
        cat > /etc/pve/firewall/{{ hostvars[item].ct_id }}.fw <<'FWEOF'
        [OPTIONS]
        enable: 1
        policy_in: DROP
        policy_out: ACCEPT

        [RULES]
        IN ACCEPT -p tcp -dport 22 -log nolog
        IN ACCEPT -p tcp -dport 80 -log nolog
        IN ACCEPT -p tcp -dport 443 -log nolog
        IN ACCEPT -p tcp -dport 9100 -source 10.24.36.20 -log nolog
        FWEOF
      loop: "{{ groups['wordpress'] }}"

    - name: Install packages in containers
      shell: >
        pct exec {{ hostvars[item].ct_id }} -- bash -c
        "apt update && apt upgrade -y &&
        apt install -y apache2 mariadb-server php php-mysql php-curl php-gd
        php-mbstring php-xml php-xmlrpc php-soap php-intl php-zip wget openssh-server"
      loop: "{{ groups['wordpress'] }}"

    - name: Setup WordPress in containers
      shell: |
        pct exec {{ hostvars[item].ct_id }} -- bash -c "
        systemctl start mariadb
        systemctl enable mariadb
        mysql -u root <<SQLEOF
        CREATE DATABASE wordpress;
        CREATE USER 'wpuser'@'localhost' IDENTIFIED BY 'wppassword';
        GRANT ALL PRIVILEGES ON wordpress.* TO 'wpuser'@'localhost';
        FLUSH PRIVILEGES;
        SQLEOF
        cd /tmp
        wget -q https://wordpress.org/latest.tar.gz
        tar -xzf latest.tar.gz
        cp -r wordpress/* /var/www/html/
        chown -R www-data:www-data /var/www/html/
        rm -f /var/www/html/index.html
        cd /var/www/html
        cp wp-config-sample.php wp-config.php
        sed -i 's/database_name_here/wordpress/' wp-config.php
        sed -i 's/username_here/wpuser/' wp-config.php
        sed -i 's/password_here/wppassword/' wp-config.php
        systemctl restart apache2
        "
      loop: "{{ groups['wordpress'] }}"

    - name: Create SSH users
      shell: |
        pct exec {{ hostvars[item].ct_id }} -- bash -c "
        useradd -m -s /bin/bash {{ hostvars[item].ssh_user }}
        mkdir -p /home/{{ hostvars[item].ssh_user }}/.ssh
        ssh-keygen -t ed25519 -f /home/{{ hostvars[item].ssh_user }}/.ssh/id_ed25519 -N ''
        cp /home/{{ hostvars[item].ssh_user }}/.ssh/id_ed25519.pub /home/{{ hostvars[item].ssh_user }}/.ssh/authorized_keys
        chown -R {{ hostvars[item].ssh_user }}:{{ hostvars[item].ssh_user }} /home/{{ hostvars[item].ssh_user }}/.ssh
        chmod 700 /home/{{ hostvars[item].ssh_user }}/.ssh
        chmod 600 /home/{{ hostvars[item].ssh_user }}/.ssh/authorized_keys
        "
      loop: "{{ groups['wordpress'] }}"

    - name: Install node_exporter
      shell: |
        pct exec {{ hostvars[item].ct_id }} -- bash -c "
        cd /tmp
        wget -q https://github.com/prometheus/node_exporter/releases/download/v1.8.1/node_exporter-1.8.1.linux-amd64.tar.gz
        tar -xzf node_exporter-1.8.1.linux-amd64.tar.gz
        cp node_exporter-1.8.1.linux-amd64/node_exporter /usr/local/bin/
        useradd --no-create-home --shell /bin/false node_exporter
        cat > /etc/systemd/system/node_exporter.service <<'NEOF'
        [Unit]
        Description=Node Exporter
        Wants=network-online.target
        After=network-online.target

        [Service]
        User=node_exporter
        Group=node_exporter
        Type=simple
        ExecStart=/usr/local/bin/node_exporter

        [Install]
        WantedBy=multi-user.target
        NEOF
        systemctl daemon-reload
        systemctl enable node_exporter
        systemctl start node_exporter
        "
      loop: "{{ groups['wordpress'] }}"

# Step 2: Update Prometheus config
- name: Update Prometheus monitoring
  hosts: localhost
  connection: local
  tasks:
    - name: Deploy Prometheus config
      shell: |
        pct exec 200 -- bash -c "cat > /etc/prometheus/prometheus.yml <<'PEOF'
        global:
          scrape_interval: 15s

        scrape_configs:
          - job_name: prometheus
            static_configs:
              - targets: ['localhost:9090']

          - job_name: wordpress-containers
            static_configs:
              - targets:
        {% for host in groups['wordpress'] %}
                - '{{ hostvars[host].ansible_host }}:9100'
        {% endfor %}
                labels:
                  group: wordpress
        PEOF
        systemctl restart prometheus
        "

